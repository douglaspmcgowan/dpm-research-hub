<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <radialGradient id="energyGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stressGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fecaca" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fecaca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fulfilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d1fae5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="560" fill="#fafafa"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#222">Three Axes, One Display</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#666">Russell's circumplex (valence × arousal) separates "energy", "stress", and "fulfillment" — a single scalar will blur them.</text>

  <!-- ===== Axes ===== -->
  <g transform="translate(450,300)">
    <!-- Gradient zones -->
    <circle cx="140" cy="-120" r="120" fill="url(#energyGrad)"/>
    <circle cx="-140" cy="-120" r="120" fill="url(#stressGrad)"/>
    <circle cx="120" cy="120" r="120" fill="url(#fulfilGrad)"/>

    <!-- Axes lines -->
    <line x1="-240" y1="0" x2="240" y2="0" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="0" y1="230" x2="0" y2="-230" stroke="#222" stroke-width="1.5" marker-end="url(#arr)"/>

    <!-- Axis labels -->
    <text x="250" y="5" font-size="12" font-weight="600" fill="#333">Pleasant (valence)</text>
    <text x="-250" y="5" text-anchor="end" font-size="12" font-weight="600" fill="#333">Unpleasant</text>
    <text x="0" y="-240" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Activated (arousal)</text>
    <text x="0" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Deactivated</text>

    <!-- Quadrant labels (small) -->
    <text x="115" y="-210" text-anchor="middle" font-size="10" fill="#999" font-style="italic">high-arousal positive</text>
    <text x="-115" y="-210" text-anchor="middle" font-size="10" fill="#999" font-style="italic">high-arousal negative</text>
    <text x="115" y="220" text-anchor="middle" font-size="10" fill="#999" font-style="italic">low-arousal positive</text>
    <text x="-115" y="220" text-anchor="middle" font-size="10" fill="#999" font-style="italic">low-arousal negative</text>

    <!-- Three constructs placed in the plane -->
    <!-- Energy: upper-right (high arousal, pleasant) -->
    <circle cx="140" cy="-120" r="14" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
    <text x="140" y="-116" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">E</text>
    <text x="140" y="-145" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Energy</text>
    <text x="140" y="-85" text-anchor="middle" font-size="10" fill="#666">vigor, alertness, drive</text>

    <!-- Stress: upper-left (high arousal, unpleasant) -->
    <circle cx="-140" cy="-120" r="14" fill="#dc2626" stroke="#7f1d1d" stroke-width="2"/>
    <text x="-140" y="-116" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">S</text>
    <text x="-140" y="-145" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">Stress</text>
    <text x="-140" y="-85" text-anchor="middle" font-size="10" fill="#666">tension, allostatic load</text>

    <!-- Fulfillment: lower-right (low arousal, pleasant) -->
    <circle cx="120" cy="120" r="14" fill="#10b981" stroke="#065f46" stroke-width="2"/>
    <text x="120" y="124" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">F</text>
    <text x="120" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Fulfillment</text>
    <text x="120" y="173" text-anchor="middle" font-size="10" fill="#666">meaning, contentment</text>

    <!-- Fatigue (opposite of energy) as reference anchor -->
    <circle cx="-120" cy="120" r="6" fill="#888" stroke="#555" stroke-width="1"/>
    <text x="-120" y="148" text-anchor="middle" font-size="10" fill="#555">fatigue</text>
    <text x="-120" y="163" text-anchor="middle" font-size="9" fill="#999">(ref. point)</text>
  </g>

  <!-- Design-note box -->
  <g transform="translate(30,450)">
    <rect width="840" height="90" fill="#fff" stroke="#ccc" rx="4"/>
    <text x="18" y="25" font-size="12" font-weight="700" fill="#333">Display implication:</text>
    <text x="18" y="46" font-size="11" fill="#555">• Battery fill-level → <tspan fill="#b45309" font-weight="600">Energy (E)</tspan> — what most people mean when they say "I'm running low."</text>
    <text x="18" y="64" font-size="11" fill="#555">• Battery color/hue or pulse rate → <tspan fill="#7f1d1d" font-weight="600">Stress (S)</tspan> — red-shift on chronic load, steady amber on acute.</text>
    <text x="18" y="82" font-size="11" fill="#555">• Secondary indicator (accent LED, icon) → <tspan fill="#065f46" font-weight="600">Fulfillment (F)</tspan> — glows after meaningful progress; independent of E and S.</text>
  </g>
</svg>
