<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="dayBg" x1="0" x2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.25" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#fde68a"/>
      <stop offset="0.78" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="#fafafa"/>
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#222">Circadian + Ultradian Prior Curve</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#666">The baseline expected-energy curve for a lark vs. an owl, with ~90 min BRAC oscillations layered on top.</text>

  <!-- time strip -->
  <rect x="70" y="80" width="780" height="16" fill="url(#dayBg)" rx="2"/>
  <g font-size="9" fill="#444">
    <text x="70" y="110" text-anchor="middle">6am</text>
    <text x="200" y="110" text-anchor="middle">9am</text>
    <text x="330" y="110" text-anchor="middle">12pm</text>
    <text x="460" y="110" text-anchor="middle">3pm</text>
    <text x="590" y="110" text-anchor="middle">6pm</text>
    <text x="720" y="110" text-anchor="middle">9pm</text>
    <text x="850" y="110" text-anchor="middle">12am</text>
  </g>

  <!-- axes for the curve -->
  <line x1="70" y1="400" x2="850" y2="400" stroke="#888" stroke-width="1"/>
  <line x1="70" y1="140" x2="70" y2="400" stroke="#888" stroke-width="1"/>
  <text x="60" y="150" text-anchor="end" font-size="10" fill="#666">high</text>
  <text x="60" y="400" text-anchor="end" font-size="10" fill="#666">low</text>
  <text x="40" y="280" text-anchor="middle" font-size="11" fill="#444" transform="rotate(-90 40 280)">expected energy (baseline)</text>

  <!-- LARK curve: peaks around 11am-2pm, declining after -->
  <!-- Using approximate sinusoidal with ultradian ripple -->
  <path d="M 70 360
           Q 120 330 150 290
           T 210 220
           Q 230 195 260 215
           T 300 195
           Q 320 180 350 195
           T 390 210
           Q 420 235 460 265
           T 520 310
           Q 550 325 590 345
           T 680 380
           Q 720 390 780 395
           L 850 398"
        fill="none" stroke="#f59e0b" stroke-width="2.8"/>
  <text x="220" y="200" font-size="11" font-weight="700" fill="#b45309">Lark (early chronotype)</text>
  <text x="220" y="215" font-size="9" fill="#92400e">peak cognitive ~13:52 (Facer-Childs 2018)</text>

  <!-- OWL curve: peaks around 5-8pm -->
  <path d="M 70 395
           Q 120 395 150 385
           T 210 370
           Q 240 355 270 345
           T 330 325
           Q 360 312 400 295
           T 460 270
           Q 490 255 530 230
           T 600 205
           Q 620 192 650 210
           T 690 195
           Q 710 185 740 205
           T 800 250
           L 850 300"
        fill="none" stroke="#7c3aed" stroke-width="2.8" stroke-dasharray="6,3"/>
  <text x="560" y="195" font-size="11" font-weight="700" fill="#6d28d9">Owl (late chronotype)</text>
  <text x="560" y="210" font-size="9" fill="#6d28d9">peak cognitive ~20:59</text>

  <!-- ULTRADIAN ripples annotation -->
  <g transform="translate(150,430)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#555">Ultradian ripples (~90–120 min BRAC, Kleitman):</text>
    <text x="0" y="16" font-size="10" fill="#666">mid-morning peak → post-prandial trough → mid-afternoon rebound → evening decline.</text>
  </g>
  <g transform="translate(250,270)">
    <path d="M 0 0 Q 10 -12 20 0 Q 30 12 40 0" fill="none" stroke="#059669" stroke-width="1.8"/>
    <text x="50" y="4" font-size="10" fill="#059669" font-style="italic">~90 min wavelet</text>
  </g>

  <!-- Implication box -->
  <g transform="translate(30,470)">
    <rect width="840" height="40" fill="#fff" stroke="#ccc" rx="4"/>
    <text x="18" y="24" font-size="11" fill="#333"><tspan font-weight="700">Implication:</tspan> signals are weighted as <tspan font-style="italic">deviations from this personalized prior</tspan>, not as absolute values. A 3 pm dip for a lark is expected; for an owl, it's a warning.</text>
  </g>
</svg>
